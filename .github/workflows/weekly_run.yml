name: Weekly DailyStock Run

"on":
  schedule:
    # Every Friday at 16:30 Asia/Shanghai, after CN/HK close.
    # GitHub Actions cron uses UTC, so this is 08:30 UTC.
    - cron: "30 8 * * 5"
  workflow_dispatch:
    inputs:
      as_of:
        description: "Run date in YYYY-MM-DD. Empty means latest Friday in Asia/Shanghai."
        required: false
        type: string
      offline:
        description: "Use data/seed/akshare CSVs only; do not call AkShare network APIs."
        required: false
        default: false
        type: boolean
  push:
    branches:
      # OpenClaw's deploy-key fallback creates an empty commit on main with a
      # "trigger: DailyStock run ..." message. The job-level guard below keeps
      # ordinary code pushes from launching full-market scans.
      - "main"
    tags:
      # Allows OpenClaw hosts with a write deploy key to trigger this workflow
      # without a GitHub PAT by pushing a disposable tag.
      - "dailystock-*"

permissions:
  contents: write

concurrency:
  group: weekly-dailystock-run
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  DAILYSTOCK_TIMEZONE: Asia/Shanghai
  DAILYSTOCK_AKSHARE_SEED_DIR: data/seed/akshare
  DAILYSTOCK_AKSHARE_OFFLINE: ${{ vars.DAILYSTOCK_AKSHARE_OFFLINE }}
  DAILYSTOCK_AKSHARE_DAILY_BAR_MODE: spot-proxy
  DAILYSTOCK_AKSHARE_SOCKET_TIMEOUT: "20"
  DAILYSTOCK_AKSHARE_PER_STOCK_FINANCIAL_LIMIT: "80"
  DAILYSTOCK_AKSHARE_HK_FINANCIAL_LIMIT: "250"
  PYTHONUNBUFFERED: "1"

jobs:
  full-market-screen:
    name: Full Market Screen
    if: >-
      ${{
        github.event_name != 'push' ||
        startsWith(github.ref, 'refs/tags/dailystock-') ||
        (github.event.head_commit && startsWith(github.event.head_commit.message, 'trigger: DailyStock run'))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Shanghai timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai || sudo ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo "TZ=Asia/Shanghai" >> "$GITHUB_ENV"
          echo "DAILYSTOCK_TIMEZONE=Asia/Shanghai" >> "$GITHUB_ENV"
          date
          timedatectl || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas pydantic pydantic-settings fastapi uvicorn typer pyyaml akshare tenacity requests
          python3 -m pip install -e .

      - name: Resolve Shanghai as_of date
        env:
          AS_OF_INPUT: ${{ github.event.inputs.as_of }}
          OFFLINE_INPUT: ${{ github.event.inputs.offline }}
        run: |
          AS_OF="$(python3 - <<'PY'
          import os
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          value = os.environ.get("AS_OF_INPUT", "").strip()
          if value:
              print(value)
          else:
              today = datetime.now(ZoneInfo("Asia/Shanghai")).date()
              days_since_friday = (today.weekday() - 4) % 7
              print((today - timedelta(days=days_since_friday)).isoformat())
          PY
          )"
          echo "DAILYSTOCK_AS_OF=$AS_OF" >> "$GITHUB_ENV"
          OFFLINE_MODE="${DAILYSTOCK_AKSHARE_OFFLINE:-false}"
          if [ "$OFFLINE_INPUT" = "true" ]; then
            echo "DAILYSTOCK_AKSHARE_OFFLINE=true" >> "$GITHUB_ENV"
            OFFLINE_MODE="true"
          fi
          echo "Resolved DailyStock as_of=$AS_OF"
          echo "AkShare offline mode=$OFFLINE_MODE"

      - name: Verify Shanghai as_of date
        run: |
          python3 - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from dailystock.utils.calendar import parse_date

          shanghai_now = datetime.now(ZoneInfo("Asia/Shanghai"))
          print(f"Shanghai now: {shanghai_now.isoformat()}")
          print(f"DailyStock as_of: {parse_date(None).isoformat()}")
          PY
          echo "Workflow as_of: ${DAILYSTOCK_AS_OF}"

      - name: Run DailyStock full market screen
        run: python3 -m dailystock.cli run --as-of "$DAILYSTOCK_AS_OF" --markets CN,HK --dry-run

      - name: Validate CN and HK coverage
        run: |
          python3 - <<'PY'
          from pathlib import Path

          import pandas as pd

          run_dir = Path("runs") / "${{ env.DAILYSTOCK_AS_OF }}".replace("-", "")
          meta_path = run_dir / "step1_meta.csv"
          if not meta_path.exists():
              raise SystemExit(f"Missing step1 metadata artifact: {meta_path}")

          meta = pd.read_csv(meta_path, low_memory=False)
          counts = meta["market"].value_counts().to_dict() if "market" in meta else {}
          print(f"Step 1 market coverage: {counts}")
          missing = [market for market in ["CN", "HK"] if counts.get(market, 0) <= 0]
          if missing:
              raise SystemExit(f"Missing requested market coverage in step1: {missing}")
          PY

      - name: Prepare report artifact
        if: always()
        run: |
          mkdir -p reports
          RUN_DIR="$(find runs -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$RUN_DIR" ]; then
            cp -R "$RUN_DIR" "reports/$(basename "$RUN_DIR")"
            [ -f "$RUN_DIR/dashboard.md" ] && cp "$RUN_DIR/dashboard.md" reports/dashboard.md
            [ -f "$RUN_DIR/feishu_summary.md" ] && cp "$RUN_DIR/feishu_summary.md" reports/feishu_summary.md
            [ -f "$RUN_DIR/result.json" ] && cp "$RUN_DIR/result.json" reports/result.json
            if [ -f "$RUN_DIR/result.json" ]; then
              python3 - "$RUN_DIR/result.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          import pandas as pd

          result_path = Path(sys.argv[1])
          reports_dir = Path("reports")
          result = json.loads(result_path.read_text(encoding="utf-8"))
          pd.DataFrame(result.get("final_candidates", [])).to_csv(
              reports_dir / "final_candidates.csv",
              index=False,
          )
          PY
            elif [ -f "$RUN_DIR/step4_valuation_candidates.csv" ]; then
              cp "$RUN_DIR/step4_valuation_candidates.csv" reports/final_candidates.csv
            fi
          fi
          find reports -maxdepth 3 -type f -print

      - name: Attach GitHub run metadata
        if: always()
        run: |
          if [ ! -f reports/feishu_summary.md ]; then
            echo "No Feishu summary to annotate."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          summary_path = Path("reports/feishu_summary.md")
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/"
              f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
              f"{os.environ['GITHUB_RUN_ID']}"
          )
          ref_type = os.environ.get("GITHUB_REF_TYPE", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          tag = ref_name if ref_type == "tag" else ""
          metadata = {
              "as_of": os.environ.get("DAILYSTOCK_AS_OF", ""),
              "tag": tag,
              "ref": os.environ.get("GITHUB_REF", ""),
              "source_sha": os.environ.get("GITHUB_SHA", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_number": os.environ.get("GITHUB_RUN_NUMBER", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "run_url": run_url,
              "generated_at": datetime.now(ZoneInfo("Asia/Shanghai")).isoformat(),
          }
          Path("reports/run_metadata.json").write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          prefix = [
              "# DailyStock GitHub Actions Result",
              "",
              f"- Tag: `{tag or '-'}`",
              f"- Run: [#{metadata['run_number']}]({run_url})",
              f"- Source commit: `{metadata['source_sha'][:12]}`",
              f"- Run attempt: `{metadata['run_attempt']}`",
              "",
          ]
          summary = summary_path.read_text(encoding="utf-8")
          summary_path.write_text("\n".join(prefix) + "\n" + summary, encoding="utf-8")
          PY

      - name: Print Feishu-readable summary
        if: always()
        run: |
          if [ -f reports/feishu_summary.md ]; then
            cat reports/feishu_summary.md
            cat reports/feishu_summary.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f reports/dashboard.md ]; then
            cat reports/dashboard.md
            cat reports/dashboard.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "DailyStock did not produce a summary file." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Send Feishu bot notification
        if: always()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.DAILYSTOCK_FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "DAILYSTOCK_FEISHU_WEBHOOK_URL secret is not configured; skipping direct Feishu send."
            exit 0
          fi
          if [ ! -f reports/feishu_summary.md ]; then
            echo "No Feishu summary to send."
            exit 0
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = Path("reports/feishu_summary.md").read_text(encoding="utf-8")
          payload = {
              "msg_type": "text",
              "content": {"text": summary[:15000]},
          }
          Path("reports/feishu_payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            --data @reports/feishu_payload.json \
            "$FEISHU_WEBHOOK_URL"

      - name: Upload DailyStock artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailystock-weekly-reports
          path: |
            reports/
            runs/**/dashboard.md
            runs/**/feishu_summary.md
            runs/**/run_metadata.json
            runs/**/step4_valuation_candidates.csv
            runs/**/result.json
          retention-days: 7
          if-no-files-found: warn

      - name: Publish latest report branch
        if: always()
        run: |
          if [ ! -f reports/feishu_summary.md ]; then
            echo "No Feishu summary to publish."
            exit 0
          fi

          TMP_REPORT_DIR="$(mktemp -d)"
          cp -R reports "$TMP_REPORT_DIR/reports"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin dailystock-results || true
          if git show-ref --verify --quiet refs/remotes/origin/dailystock-results; then
            git checkout -B dailystock-results origin/dailystock-results
          else
            git checkout --orphan dailystock-results
            git rm -rf . || true
          fi

          RUN_KEY="${DAILYSTOCK_AS_OF//-/}"
          mkdir -p latest "history/$RUN_KEY"
          cp "$TMP_REPORT_DIR/reports/feishu_summary.md" latest/feishu_summary.md
          cp "$TMP_REPORT_DIR/reports/dashboard.md" latest/dashboard.md 2>/dev/null || true
          cp "$TMP_REPORT_DIR/reports/result.json" latest/result.json 2>/dev/null || true
          cp "$TMP_REPORT_DIR/reports/run_metadata.json" latest/run_metadata.json 2>/dev/null || true
          cp "$TMP_REPORT_DIR/reports/final_candidates.csv" latest/final_candidates.csv 2>/dev/null || true
          cp -R latest/. "history/$RUN_KEY/"

          git add latest "history/$RUN_KEY"
          git commit -m "chore: publish DailyStock report $DAILYSTOCK_AS_OF" || {
            echo "No report changes to publish."
            exit 0
          }
          git push origin dailystock-results
